apiVersion: 1

policies:
  - orgId: 1
    receiver: telegram-webhook
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: telegram-webhook
        matchers:
          - device = ioniq
          - severity = critical
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 1h
      - receiver: telegram-webhook
        matchers:
          - device = ioniq
          - severity = warning
        group_wait: 1m
        group_interval: 5m
        repeat_interval: 12h
      - receiver: telegram-webhook
        matchers:
          - device = ioniq
          - severity = info
        group_wait: 5m
        group_interval: 30m
        repeat_interval: 24h
