apiVersion: 1

groups:
  - orgId: 1
    name: Phase power loss webhook
    folder: Webhook Alerting
    interval: 1m
    rules:
      - uid: webhook-phaseloss01
        title: Phase Power Loss (Webhook)
        condition: B
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: P3C6603E967DC8568
            model:
              alias: "$tag_phase"
              groupBy:
                - params: ["$__interval"]
                  type: time
                - params: ["phase"]
                  type: tag
                - params: ["none"]
                  type: fill
              intervalMs: 1000
              maxDataPoints: 43200
              measurement: current_power
              orderByTime: ASC
              policy: default
              resultFormat: time_series
              select:
                - - params: ["v"]
                    type: field
                  - params: []
                    type: last
              tags:
                - key: "device.name"
                  operator: "="
                  value: main
          - refId: B
            queryType: ''
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              datasource:
                type: __expr__
                uid: __expr__
              conditions:
                - evaluator:
                    params: [50]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
              intervalMs: 1000
              maxDataPoints: 43200
              type: classic_conditions
        noDataState: OK
        execErrState: OK
        for: 2m
        annotations:
          summary: "⚡ Phase power lost"
          description: "Phase {{ $labels.phase }} of the mains has dropped to 0 V while the meter is still reporting. One or more phases are out; the meter's own supply phase is still live."
        labels:
          rule_uid: webhook-phaseloss01
          alert_type: webhook
